[pytest]
# Pytest configuration for Interlevel POC

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test markers
markers =
    unit: Unit tests
    integration: Integration tests (may be slow)
    slow: Slow running tests
    ollama: Tests that require Ollama running

# Test output
addopts =
    -v
    --tb=short
    -ra

# Test paths
testpaths = tests

# Ignore warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
